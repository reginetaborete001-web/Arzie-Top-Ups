<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arzie Top Ups | Fast & Secure</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">ARZIE <span>TOP UPS</span></div>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Track Order</a></li>
            <li><a href="#">Support</a></li>
        </ul>
    </nav>

    <header>
        <h1>Level Up Your Game Instantly</h1>
        <p>Secure, fast, and reliable top-ups for your favorite titles.</p>
    </header>

    <section class="container">
        <div class="card">
            <h3>1. Select Game</h3>
            <div class="game-grid">
                <button class="game-btn active">Mobile Legends</button>
                <button class="game-btn">Free Fire</button>
                <button class="game-btn">Genshin Impact</button>
                <button class="game-btn">PUBG Mobile</button>
            </div>

            <h3>2. Enter User ID</h3>
            <input type="text" placeholder="e.g. 12345678 (1234)" class="input-field">

            <h3>3. Select Amount</h3>
            <div class="denom-grid">
                <button class="price-btn">50 Diamonds <br> <span>$0.99</span></button>
                <button class="price-btn">250 Diamonds <br> <span>$4.99</span></button>
                <button class="price-btn">500 Diamonds <br> <span>$9.99</span></button>
            </div>

            <button class="buy-now">Buy Now</button>
        </div>
    </section>
</body>
</html>
